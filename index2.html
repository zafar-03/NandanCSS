<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            border: 1px solid black;
            width: 250px;
            height: 250px;
            
            /*Conic */
        }
        .box1{
            background-image: conic-gradient(red,yellow);
        }
       
        .box2{
            background-image: conic-gradient(red,yellow,red);
        }
        .box3{
            background-image: conic-gradient(red 0deg,red 120deg,yellow 120deg,yellow);
        }
        .box4{
            background-image: repeating-conic-gradient(red 0deg,red 90deg,yellow 90deg,yellow 180deg);
        }
        .box5{
            background-image: repeating-conic-gradient(red 0deg,red 90deg,yellow 90deg,yellow 180deg);
            background-size: 50px 50px;
            /* background-repeat: no-repeat; */
        }
    </style>
</head>
<body>
    <div class="box1">Box1</div>
    <div class="box2">Box2</div>
    <div class="box3">Box3</div>
    <div class="box4">Box4</div>
    <div class="box5">Box5</div>
    <div class="box6">Box6</div>
    <div class="box7">Box7</div>
    <div class="box8">Box8</div>
    <div class="box9">Box9</div>
    <div class="box10">Box10</div>
</body>
</html>
