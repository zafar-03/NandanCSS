<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using Block</title>
    <style>
        body{
            background-color: black;
        }
        div{
            background-color: teal;
            color: white;
            padding: 20px;
            width: 300px;
            height: 600px;
        }
        main{
            background-color: darkblue;
            margin: 10px;
            padding: 20px;
            font-family: cursive;
            display: block;
        }
    </style>
</head>
<body>
    <div>
        <main>HOME</main>
        <main>ABOUT</main>
        <main>CONTACT</main>
        <main>SERVICE</main>
        <main>FOLLOWUS</main>
    </div>
</body>
</html>
