<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body {
            background-color: black;
        }

        div {
            width: 500px;
            height: 550px;
            background-image: linear-gradient(to top, gray, rgb(200, 197, 197));
            margin: 50px auto;
            padding: 100px;
        }

        main {
            background-color: white;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        .menu {
            background-color: rgb(7, 101, 252);
            color: white;
            text-align: center;
            border-radius: 16px;
            clear: both;
        }

        /* Combinator Selector */
        .menu span{
            font-size: 56px;
            margin: 10px;
        }
        .para{
            padding: 20px 0px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 24px;
            text-align: center;
        }
        .profile .s1{
            /* display: inline-block; */
            float: left;
        }
        .profile .s2{
            /* display: inline-block; */
            float: right;
            padding-bottom: 20px;
        }
    </style>
</head>

<body>
    <div>
        <main >
            <aside class="profile">
                <section class="s1">
                    <h3>Krish</h3>
                    <p>Developer</p>
                </section>
                <section class="s2">
                    <img src="https://picsum.photos/seed/picsum/200/" alt="">
                </section>
            </aside>
            <aside class="menu">
                <span class="material-symbols-outlined">
                    favorite
                </span>
                <span class="material-symbols-outlined">
                    settings
                </span>
                <span class="material-symbols-outlined">
                    check_box
                </span>
            </aside>
            <aside class="para">
                <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Harum veniam esse delectus! Incidunt est dolorem, iure fuga facere ducimus perferendis aut cum ipsa quia rem maxime aliquam nisi quos ullam.</p>
            </aside>
        </main>
    </div>
</body>

</html>
